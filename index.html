<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jihawi Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            serif: ['Lora', 'Georgia', 'serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">

  <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-950/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-[1100px] mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <a href="#" id="brandLink" class="flex items-center gap-3 group">
        <div class="w-8 h-8 bg-gray-900 dark:bg-white rounded-lg flex items-center justify-center text-white dark:text-gray-900 text-xs font-bold tracking-tight">JQ</div>
        <div>
          <h1 class="text-sm font-semibold leading-tight tracking-tight">Jihawi Quiz</h1>
          <p class="text-[11px] text-gray-500 dark:text-gray-500 leading-tight">Examen Régional · Français · 1ère Bac</p>
        </div>
      </a>
      <button id="themeToggle" class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors" aria-label="Thème">
        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
      </button>
    </div>
  </header>

  <main id="app" class="max-w-[1100px] mx-auto px-4 sm:px-6 py-6 sm:py-8"></main>

  <footer class="text-center py-8 px-4 text-xs text-gray-400 dark:text-gray-600 border-t border-gray-100 dark:border-gray-900">
    developed by Abdelilah Eddalil | Bonne chance fl jihawi
  </footer>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
